name: "nightly-release"

on:
  push:
    branches: [ main ]

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
    TITLES_ARTIFACT: titles
    TITLES_ARTIFACT_PATH: titles.txt
    TITLES_ARCHIVE_ARTIFACT: titles-archive
    PREVIEWS_ARTIFACT: previews
    PREVIEWS_ARTIFACT_PATH: previews.txt
    PREVIEWS_ARCHIVE_ARTIFACT: previews-archive
    ICONS_ARTIFACT: icons
    ICONS_ARTIFACT_PATH: icons.txt
    ICONS_ARCHIVE_ARTIFACT: icons-archive
    FLYERS_ARTIFACT: flyers
    FLYERS_ARTIFACT_PATH: flyers.txt
    FLYERS_ARCHIVE_ARTIFACT: flyers-archive
    NEOCDZCOVERS_ARTIFACT: neocdzcovers
    NEOCDZCOVERS_ARTIFACT_PATH: neocdzcovers.txt
    NEOCDZCOVERS_ARCHIVE_ARTIFACT: neocdzcovers-archive
    NEOCDZPREVIEWS_ARTIFACT: neocdzpreviews
    NEOCDZPREVIEWS_ARTIFACT_PATH: neocdzpreviews.txt
    NEOCDZPREVIEWS_ARCHIVE_ARTIFACT: neocdzpreviews-archive

jobs:
  build_titles:
    name: Build titles
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash {0}
    steps:
      - name: Clone
        uses: actions/checkout@v6

      - name: Build
        id: create_titles_archive
        run: |
          archive_file="${{ env.TITLES_ARTIFACT }}.zip"
          echo "archive_file=${archive_file}" >> $GITHUB_OUTPUT
          zip -r "${archive_file}" _credits.txt titles

      - name: Create Archive Path
        run: |
          echo archive_path= '${{ steps.create_titles_archive.outputs.archive_file }}' > $TITLES_ARTIFACT_PATH

      - name: Upload Archive Path
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.TITLES_ARTIFACT }}
          path: ${{ env.TITLES_ARTIFACT_PATH }}
          retention-days: 1

      - name: Upload Archive as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.TITLES_ARCHIVE_ARTIFACT }}
          path: ${{ steps.create_titles_archive.outputs.archive_file }}
          retention-days: 1

  build_previews:
    name: Build previews
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash {0}
    steps:
      - name: Clone
        uses: actions/checkout@v6

      - name: Build
        id: create_previews_archive
        run: |
          archive_file="${{ env.PREVIEWS_ARTIFACT }}.zip"
          echo "archive_file=${archive_file}" >> $GITHUB_OUTPUT
          zip -r "${archive_file}" _credits.txt previews

      - name: Create Archive Path
        run: |
          echo archive_path= '${{ steps.create_previews_archive.outputs.archive_file }}' > $PREVIEWS_ARTIFACT_PATH

      - name: Upload Archive Path
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PREVIEWS_ARTIFACT }}
          path: ${{ env.PREVIEWS_ARTIFACT_PATH }}
          retention-days: 1

      - name: Upload Archive as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PREVIEWS_ARCHIVE_ARTIFACT }}
          path: ${{ steps.create_previews_archive.outputs.archive_file }}
          retention-days: 1

  build_icons:
    name: Build icons
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash {0}
    steps:
      - name: Clone
        uses: actions/checkout@v6

      - name: Build
        id: create_icons_archive
        run: |
          archive_file="${{ env.ICONS_ARTIFACT }}.zip"
          echo "archive_file=${archive_file}" >> $GITHUB_OUTPUT
          zip -r "${archive_file}" _credits.txt icons

      - name: Create Archive Path
        run: |
          echo archive_path= '${{ steps.create_icons_archive.outputs.archive_file }}' > $ICONS_ARTIFACT_PATH

      - name: Upload Archive Path
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ICONS_ARTIFACT }}
          path: ${{ env.ICONS_ARTIFACT_PATH }}
          retention-days: 1

      - name: Upload Archive as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ICONS_ARCHIVE_ARTIFACT }}
          path: ${{ steps.create_icons_archive.outputs.archive_file }}
          retention-days: 1

  build_flyers:
    name: Build flyers
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash {0}
    steps:
      - name: Clone
        uses: actions/checkout@v6

      - name: Build
        id: create_flyers_archive
        run: |
          archive_file="${{ env.FLYERS_ARTIFACT }}.zip"
          echo "archive_file=${archive_file}" >> $GITHUB_OUTPUT
          zip -r "${archive_file}" _credits.txt flyers

      - name: Create Archive Path
        run: |
          echo archive_path= '${{ steps.create_flyers_archive.outputs.archive_file }}' > $FLYERS_ARTIFACT_PATH

      - name: Upload Archive Path
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.FLYERS_ARTIFACT }}
          path: ${{ env.FLYERS_ARTIFACT_PATH }}
          retention-days: 1

      - name: Upload Archive as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.FLYERS_ARCHIVE_ARTIFACT }}
          path: ${{ steps.create_flyers_archive.outputs.archive_file }}
          retention-days: 1

  build_neocdzcovers:
    name: Build neocdzcovers
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash {0}
    steps:
      - name: Clone
        uses: actions/checkout@v6

      - name: Build
        id: create_neocdzcovers_archive
        run: |
          archive_file="${{ env.NEOCDZCOVERS_ARTIFACT }}.zip"
          echo "archive_file=${archive_file}" >> $GITHUB_OUTPUT
          zip -r "${archive_file}" _credits.txt neocdzcovers

      - name: Create Archive Path
        run: |
          echo archive_path= '${{ steps.create_neocdzcovers_archive.outputs.archive_file }}' > $NEOCDZCOVERS_ARTIFACT_PATH

      - name: Upload Archive Path
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.NEOCDZCOVERS_ARTIFACT }}
          path: ${{ env.NEOCDZCOVERS_ARTIFACT_PATH }}
          retention-days: 1

      - name: Upload Archive as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.NEOCDZCOVERS_ARCHIVE_ARTIFACT }}
          path: ${{ steps.create_neocdzcovers_archive.outputs.archive_file }}
          retention-days: 1

  build_neocdzpreviews:
    name: Build neocdzpreviews
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash {0}
    steps:
      - name: Clone
        uses: actions/checkout@v6

      - name: Build
        id: create_neocdzpreviews_archive
        run: |
          archive_file="${{ env.NEOCDZPREVIEWS_ARTIFACT }}.zip"
          echo "archive_file=${archive_file}" >> $GITHUB_OUTPUT
          zip -r "${archive_file}" _credits.txt neocdzpreviews

      - name: Create Archive Path
        run: |
          echo archive_path= '${{ steps.create_neocdzpreviews_archive.outputs.archive_file }}' > $NEOCDZPREVIEWS_ARTIFACT_PATH

      - name: Upload Archive Path
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.NEOCDZPREVIEWS_ARTIFACT }}
          path: ${{ env.NEOCDZPREVIEWS_ARTIFACT_PATH }}
          retention-days: 1

      - name: Upload Archive as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.NEOCDZPREVIEWS_ARCHIVE_ARTIFACT }}
          path: ${{ steps.create_neocdzpreviews_archive.outputs.archive_file }}
          retention-days: 1

  release:
    needs: [ build_titles, build_previews, build_icons, build_flyers, build_neocdzcovers, build_neocdzpreviews ]
    name: Release
    runs-on: ubuntu-latest
    steps:
      # We'll need the repo if we want to use gh command line later
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # titles
      - name: Download Artifact (titles)
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.TITLES_ARTIFACT }}

      - name: Extract Archive Path (titles) and Store in Step Outputs
        id: store_titles
        run: |
          archive_path=`sed -E -n -e 's/archive_path= //p' $TITLES_ARTIFACT_PATH`
          echo "archive_path=$archive_path" >> $GITHUB_OUTPUT

      - name: Download Artifact with Archive (titles)
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.TITLES_ARCHIVE_ARTIFACT }}

      # previews
      - name: Download Artifact (previews)
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PREVIEWS_ARTIFACT }}

      - name: Extract Archive Path (previews) and Store in Step Outputs
        id: store_previews
        run: |
          archive_path=`sed -E -n -e 's/archive_path= //p' $PREVIEWS_ARTIFACT_PATH`
          echo "archive_path=$archive_path" >> $GITHUB_OUTPUT

      - name: Download Artifact with Archive (previews)
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PREVIEWS_ARCHIVE_ARTIFACT }}

      # icons
      - name: Download Artifact (icons)
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ICONS_ARTIFACT }}

      - name: Extract Archive Path (icons) and Store in Step Outputs
        id: store_icons
        run: |
          archive_path=`sed -E -n -e 's/archive_path= //p' $ICONS_ARTIFACT_PATH`
          echo "archive_path=$archive_path" >> $GITHUB_OUTPUT

      - name: Download Artifact with Archive (icons)
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ICONS_ARCHIVE_ARTIFACT }}

      # flyers
      - name: Download Artifact (flyers)
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.FLYERS_ARTIFACT }}

      - name: Extract Archive Path (flyers) and Store in Step Outputs
        id: store_flyers
        run: |
          archive_path=`sed -E -n -e 's/archive_path= //p' $FLYERS_ARTIFACT_PATH`
          echo "archive_path=$archive_path" >> $GITHUB_OUTPUT

      - name: Download Artifact with Archive (flyers)
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.FLYERS_ARCHIVE_ARTIFACT }}

      # neocdzcovers
      - name: Download Artifact (neocdzcovers)
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.NEOCDZCOVERS_ARTIFACT }}

      - name: Extract Archive Path (neocdzcovers) and Store in Step Outputs
        id: store_neocdzcovers
        run: |
          archive_path=`sed -E -n -e 's/archive_path= //p' $NEOCDZCOVERS_ARTIFACT_PATH`
          echo "archive_path=$archive_path" >> $GITHUB_OUTPUT

      - name: Download Artifact with Archive (neocdzcovers)
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.NEOCDZCOVERS_ARCHIVE_ARTIFACT }}

      # neocdzpreviews
      - name: Download Artifact (neocdzpreviews)
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.NEOCDZPREVIEWS_ARTIFACT }}

      - name: Extract Archive Path (neocdzpreviews) and Store in Step Outputs
        id: store_neocdzpreviews
        run: |
          archive_path=`sed -E -n -e 's/archive_path= //p' $NEOCDZPREVIEWS_ARTIFACT_PATH`
          echo "archive_path=$archive_path" >> $GITHUB_OUTPUT

      - name: Download Artifact with Archive (neocdzpreviews)
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.NEOCDZPREVIEWS_ARCHIVE_ARTIFACT }}

      # Create new nightly
      - name: Release new nightly
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "latest" > /dev/null 2>&1; then
            gh release delete "latest" --cleanup-tag --yes
          fi
          gh release create "latest" --title "nightly release" --latest --target "${{ github.sha }}" \
            ${{ steps.store_titles.outputs.archive_path }} \
            ${{ steps.store_previews.outputs.archive_path }} \
            ${{ steps.store_icons.outputs.archive_path }} \
            ${{ steps.store_flyers.outputs.archive_path }} \
            ${{ steps.store_neocdzcovers.outputs.archive_path }} \
            ${{ steps.store_neocdzpreviews.outputs.archive_path }}
